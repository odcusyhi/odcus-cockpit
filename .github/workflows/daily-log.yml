name: Daily Log Stub

on:
  schedule:
    # 17:00 UTC = 19:00 Zurich (CEST) / 18:00 Zurich (CET)
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dated log stub
        run: |
          DATE=$(date -u +%Y-%m-%d)
          LOG_FILE="logs/${DATE}.md"
          if [ ! -f "$LOG_FILE" ]; then
            cat > "$LOG_FILE" << EOF
          # Session Log — ${DATE}

          > Auto-created by GitHub Actions at 17:00 UTC. Enriched by /schedule agent.

          ## Status
          - [ ] Enriched by /schedule agent

          ## Sessions

          *(no entries yet)*

          ## Summary

          *(pending)*
          EOF
          fi

      - name: Commit log stub
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "logs/${DATE}.md"
          git diff --cached --quiet || git commit -m "chore: daily log stub ${DATE}"
          git push
