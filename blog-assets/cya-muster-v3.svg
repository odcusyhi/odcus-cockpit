<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs><style>text { font-family: Inter, Arial, Helvetica, sans-serif; }</style></defs>
<rect width="1200" height="630" fill="#FFFFFF"/>

<!-- Background decoration -->
<circle cx="80" cy="590" r="100" fill="#E0D9F5" opacity="0.35"/>
<circle cx="1160" cy="80" r="80" fill="#61D2CE" opacity="0.18"/>
<circle cx="620" cy="595" r="55" fill="#E0D9F5" opacity="0.25"/>

<!-- Title -->
<text x="600" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="#1A1A2E">Die vier Muster der CYA-Kultur</text>
<text x="600" y="76" text-anchor="middle" font-size="14" fill="#4A4A6A">Wie Absicherungsverhalten in der Praxis aussieht</text>

<!-- ===== STATION 1: Die Warn-E-Mail ===== -->
<rect x="75" y="105" width="222" height="212" rx="20" fill="#590DA0"/>
<rect x="87" y="116" width="40" height="28" rx="7" fill="rgba(255,255,255,0.22)"/>
<text x="107" y="135" text-anchor="middle" font-size="14" font-weight="800" fill="#FFFFFF">01</text>
<!-- Envelope body -->
<rect x="135" y="168" width="108" height="82" rx="6" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="3"/>
<!-- Flap (V pointing down into envelope) -->
<polyline points="135,180 186,216 243,180" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="3" stroke-linejoin="round"/>
<!-- Text lines inside -->
<line x1="154" y1="228" x2="224" y2="228" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
<line x1="154" y1="240" x2="206" y2="240" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
<!-- ! badge -->
<circle cx="242" cy="158" r="16" fill="#61D2CE"/>
<text x="242" y="165" text-anchor="middle" font-size="19" font-weight="800" fill="#1A1A2E">!</text>
<!-- Labels -->
<text x="186" y="346" text-anchor="middle" font-size="16" font-weight="800" fill="#590DA0">Die Warn-E-Mail</text>
<text x="186" y="368" text-anchor="middle" font-size="12" fill="#4A4A6A">Risiko dokumentiert,</text>
<text x="186" y="384" text-anchor="middle" font-size="12" fill="#4A4A6A">nicht gelöst</text>

<!-- Arrow 1 → 2 -->
<line x1="304" y1="211" x2="337" y2="211" stroke="#590DA0" stroke-width="3.5"/>
<polygon points="337,203 354,211 337,219" fill="#590DA0"/>

<!-- ===== STATION 2: Der Approval-Loop ===== -->
<rect x="360" y="105" width="222" height="212" rx="20" fill="#61D2CE"/>
<rect x="372" y="116" width="40" height="28" rx="7" fill="rgba(0,0,0,0.12)"/>
<text x="392" y="135" text-anchor="middle" font-size="14" font-weight="800" fill="#1A1A2E">02</text>
<!-- Hub: dark center + 6 satellites -->
<circle cx="471" cy="211" r="28" fill="#1A1A2E" opacity="0.7"/>
<circle cx="471" cy="211" r="16" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
<!-- Lines + satellite circles (6 at r=60) -->
<line x1="471" y1="183" x2="471" y2="163" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="471" cy="151" r="13" fill="rgba(255,255,255,0.9)"/>
<line x1="497" y1="196" x2="514" y2="185" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="522" cy="181" r="13" fill="rgba(255,255,255,0.9)"/>
<line x1="497" y1="226" x2="514" y2="237" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="522" cy="241" r="13" fill="rgba(255,255,255,0.9)"/>
<line x1="471" y1="239" x2="471" y2="259" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="471" cy="271" r="13" fill="rgba(255,255,255,0.9)"/>
<line x1="445" y1="226" x2="428" y2="237" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="420" cy="241" r="13" fill="rgba(255,255,255,0.9)"/>
<line x1="445" y1="196" x2="428" y2="185" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
<circle cx="420" cy="181" r="13" fill="rgba(255,255,255,0.9)"/>
<!-- Labels -->
<text x="471" y="346" text-anchor="middle" font-size="16" font-weight="800" fill="#1A1A2E">Der Approval-Loop</text>
<text x="471" y="368" text-anchor="middle" font-size="12" fill="#1A1A2E">7 Stellen nicken ab –</text>
<text x="471" y="384" text-anchor="middle" font-size="12" fill="#1A1A2E">1 ist betroffen</text>

<!-- Arrow 2 → 3 -->
<line x1="589" y1="211" x2="622" y2="211" stroke="#61D2CE" stroke-width="3.5"/>
<polygon points="622,203 639,211 622,219" fill="#61D2CE"/>

<!-- ===== STATION 3: Der sichere Vendor ===== -->
<rect x="645" y="105" width="222" height="212" rx="20" fill="#590DA0"/>
<rect x="657" y="116" width="40" height="28" rx="7" fill="rgba(255,255,255,0.22)"/>
<text x="677" y="135" text-anchor="middle" font-size="14" font-weight="800" fill="#FFFFFF">03</text>
<!-- Building icon centered at (756, 211) -->
<polygon points="710,182 802,182 756,150" fill="rgba(255,255,255,0.9)"/>
<rect x="710" y="182" width="92" height="88" rx="3" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.88)" stroke-width="2.5"/>
<rect x="720" y="193" width="18" height="18" rx="2" fill="rgba(255,255,255,0.72)"/>
<rect x="746" y="193" width="18" height="18" rx="2" fill="rgba(255,255,255,0.72)"/>
<rect x="772" y="193" width="18" height="18" rx="2" fill="rgba(255,255,255,0.72)"/>
<rect x="720" y="220" width="18" height="18" rx="2" fill="rgba(255,255,255,0.72)"/>
<rect x="772" y="220" width="18" height="18" rx="2" fill="rgba(255,255,255,0.72)"/>
<rect x="744" y="232" width="20" height="38" rx="2" fill="rgba(255,255,255,0.5)"/>
<!-- Checkmark badge -->
<circle cx="800" cy="154" r="17" fill="#61D2CE"/>
<text x="800" y="161" text-anchor="middle" font-size="19" font-weight="700" fill="#1A1A2E">✓</text>
<!-- Labels -->
<text x="756" y="346" text-anchor="middle" font-size="16" font-weight="800" fill="#590DA0">Der sichere Vendor</text>
<text x="756" y="368" text-anchor="middle" font-size="12" fill="#4A4A6A">Nicht den Besten –</text>
<text x="756" y="384" text-anchor="middle" font-size="12" fill="#4A4A6A">den Bekannten wählen</text>

<!-- Arrow 3 → 4 -->
<line x1="874" y1="211" x2="907" y2="211" stroke="#590DA0" stroke-width="3.5"/>
<polygon points="907,203 924,211 907,219" fill="#590DA0"/>

<!-- ===== STATION 4: Das Scope-Kabuki ===== -->
<rect x="930" y="105" width="222" height="212" rx="20" fill="#61D2CE"/>
<rect x="942" y="116" width="40" height="28" rx="7" fill="rgba(0,0,0,0.12)"/>
<text x="962" y="135" text-anchor="middle" font-size="14" font-weight="800" fill="#1A1A2E">04</text>
<!-- Target bullseye + ? centered at (1041, 211) -->
<circle cx="1041" cy="211" r="57" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3.5"/>
<circle cx="1041" cy="211" r="39" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3"/>
<circle cx="1041" cy="211" r="21" fill="rgba(255,255,255,0.88)"/>
<text x="1041" y="222" text-anchor="middle" font-size="27" font-weight="800" fill="#1A1A2E">?</text>
<!-- Labels -->
<text x="1041" y="346" text-anchor="middle" font-size="16" font-weight="800" fill="#1A1A2E">Das Scope-Kabuki</text>
<text x="1041" y="368" text-anchor="middle" font-size="12" fill="#1A1A2E">Erfolg bleibt</text>
<text x="1041" y="384" text-anchor="middle" font-size="12" fill="#1A1A2E">umdefinierbar</text>

<!-- Annotation / footer -->
<text x="600" y="430" text-anchor="middle" font-size="13" font-style="italic" fill="#590DA0">„Wenn alle Schuld haben, hat niemand Schuld."</text>
<rect x="75" y="450" width="1050" height="44" rx="10" fill="#590DA0" opacity="0.07"/>
<text x="600" y="477" text-anchor="middle" font-size="13" fill="#590DA0" font-weight="600">Alle vier Muster teilen dasselbe Ziel: Verantwortung diffus halten, um persönliche Konsequenzen zu vermeiden.</text>
</svg>
