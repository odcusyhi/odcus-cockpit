<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs><style>text { font-family: Inter,Arial,Helvetica,sans-serif; }</style></defs>
<rect width="1200" height="630" fill="#F8F7FF" rx="12"/>

<text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A2E">Entscheidung vs. Ergebnis: Die vier Fälle</text>
<text x="600" y="68" text-anchor="middle" font-size="13" fill="#4A4A6A">CYA-Kulturen verwechseln Glück mit Können – und Pech mit Versagen</text>

<!-- Y axis label -->
<text x="38" y="360" text-anchor="middle" font-size="14" fill="#1A1A2E" font-weight="600" transform="rotate(-90,38,360)">Ergebnis</text>
<text x="55" y="530" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,55,530)">schlecht</text>
<text x="55" y="200" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,55,200)">gut</text>

<!-- X axis label -->
<text x="620" y="610" text-anchor="middle" font-size="14" fill="#1A1A2E" font-weight="600">Entscheidungsqualität</text>
<text x="335" y="592" text-anchor="middle" font-size="11" fill="#888">gut</text>
<text x="865" y="592" text-anchor="middle" font-size="11" fill="#888">schlecht</text>

<!-- Quadrant backgrounds -->
<!-- TL: Idealfall (teal) -->
<rect x="80" y="82" width="510" height="245" rx="10" fill="#61D2CE" opacity="0.18"/>
<rect x="80" y="82" width="510" height="245" rx="10" fill="none" stroke="#61D2CE" stroke-width="2.5"/>
<!-- TR: Glück (warning – wrongly rewarded in CYA) -->
<rect x="610" y="82" width="510" height="245" rx="10" fill="#590DA0" opacity="0.10"/>
<rect x="610" y="82" width="510" height="245" rx="10" fill="none" stroke="#590DA0" stroke-width="2.5" stroke-dasharray="8,4"/>
<!-- BL: Pech (wrongly punished in CYA) -->
<rect x="80" y="347" width="510" height="210" rx="10" fill="#590DA0" opacity="0.10"/>
<rect x="80" y="347" width="510" height="210" rx="10" fill="none" stroke="#590DA0" stroke-width="2.5" stroke-dasharray="8,4"/>
<!-- BR: Fehler (gray) -->
<rect x="610" y="347" width="510" height="210" rx="10" fill="#E8E8F0"/>
<rect x="610" y="347" width="510" height="210" rx="10" fill="none" stroke="#AAAABC" stroke-width="2"/>

<!-- Center dividers -->
<line x1="80" y1="327" x2="1120" y2="327" stroke="#1A1A2E" stroke-width="2" opacity="0.2"/>
<line x1="590" y1="82" x2="590" y2="557" stroke="#1A1A2E" stroke-width="2" opacity="0.2"/>

<!-- TL: Idealfall -->
<text x="335" y="130" text-anchor="middle" font-size="20" font-weight="700" fill="#0A8A87">Idealfall</text>
<rect x="255" y="140" width="160" height="26" fill="#0A8A87" rx="6"/>
<text x="335" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gute Entscheidung ✓</text>
<text x="335" y="196" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Prozess war richtig.</text>
<text x="335" y="216" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Weiterhin so entscheiden.</text>
<text x="335" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#0A8A87">Fortführen</text>

<!-- TR: Glück (wrongly rewarded) -->
<text x="865" y="130" text-anchor="middle" font-size="20" font-weight="700" fill="#590DA0">Glück</text>
<rect x="785" y="140" width="160" height="26" fill="#590DA0" rx="6"/>
<text x="865" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Schlechte Entscheidung ✗</text>
<text x="865" y="196" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Prozess war schlecht.</text>
<text x="865" y="216" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">CYA-Kulturen belohnen das.</text>
<text x="865" y="236" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Kein Lernen findet statt.</text>
<text x="865" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#590DA0">Prozess korrigieren</text>

<!-- BL: Pech (wrongly punished) -->
<text x="335" y="397" text-anchor="middle" font-size="20" font-weight="700" fill="#590DA0">Pech</text>
<rect x="255" y="407" width="160" height="26" fill="#590DA0" rx="6"/>
<text x="335" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gute Entscheidung ✓</text>
<text x="335" y="463" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Prozess war richtig.</text>
<text x="335" y="483" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">CYA-Kulturen bestrafen das.</text>
<text x="335" y="503" text-anchor="middle" font-size="13" fill="#1A1A2E" opacity="0.8">Lernbereitschaft stirbt.</text>
<text x="335" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#590DA0">Darf nicht bestraft werden</text>

<!-- BR: Fehler -->
<text x="865" y="397" text-anchor="middle" font-size="20" font-weight="700" fill="#888">Fehler</text>
<rect x="815" y="407" width="100" height="26" fill="#AAAABC" rx="6"/>
<text x="865" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Analysieren ✗</text>
<text x="865" y="463" text-anchor="middle" font-size="13" fill="#888" opacity="0.8">Prozess war schlecht.</text>
<text x="865" y="483" text-anchor="middle" font-size="13" fill="#888" opacity="0.8">Ergebnis war schlecht.</text>
<text x="865" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#888">Ursache analysieren</text>

<!-- CYA mistake annotations -->
<text x="590" y="568" text-anchor="middle" font-size="12" fill="#590DA0" font-weight="600">CYA-Kulturen bestraft Pech und belohnt Glück. Gute Organisationen bewerten den Prozess – nicht das Glück.</text>
</svg>
