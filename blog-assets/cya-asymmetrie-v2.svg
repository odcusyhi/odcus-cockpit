<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs><style>text { font-family: Inter,Arial,Helvetica,sans-serif; }</style></defs>
<rect width="1200" height="630" fill="#F8F7FF" rx="12"/>

<text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A2E">Warum Absicherung rational wird</text>
<text x="600" y="68" text-anchor="middle" font-size="13" fill="#4A4A6A">Das Ungleichgewicht, das CYA-Kultur schafft</text>

<!-- Baseline -->
<line x1="120" y1="540" x2="1080" y2="540" stroke="#E0D9F5" stroke-width="2"/>

<!-- Bar 1: Schmerz (large, purple) -->
<!-- Body -->
<rect x="200" y="175" width="300" height="365" fill="#590DA0" rx="8"/>
<!-- Cap -->
<rect x="200" y="163" width="300" height="22" fill="#4A1888" rx="4"/>
<!-- Circle -->
<circle cx="350" cy="143" r="22" fill="#4A1888"/>
<text x="350" y="151" text-anchor="middle" font-size="20" fill="#FFFFFF">!</text>
<!-- Label above circle -->
<text x="350" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A2E">Schmerz bei Fehler</text>
<!-- Content inside bar -->
<text x="350" y="295" text-anchor="middle" font-size="44" font-weight="800" fill="#FFFFFF">HOCH</text>
<text x="350" y="345" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.85)">Persönlich zurechenbar</text>
<text x="350" y="365" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.85)">Sofort sichtbar</text>
<text x="350" y="385" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.85)">Bleibt in Erinnerung</text>
<!-- Bar level indicator -->
<text x="350" y="500" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.6)">Karriererisiko hoch</text>

<!-- Bar 2: Gewinn (small, muted gray) -->
<!-- Body -->
<rect x="700" y="420" width="300" height="120" fill="#E0D9F5" rx="8"/>
<!-- Cap -->
<rect x="700" y="408" width="300" height="22" fill="#C8B8E0" rx="4"/>
<!-- Circle -->
<circle cx="850" cy="388" r="22" fill="#C8B8E0"/>
<text x="850" y="396" text-anchor="middle" font-size="20" fill="#4A4A6A">?</text>
<!-- Label above circle -->
<text x="850" y="353" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A2E">Gewinn beim Rechthaben</text>
<!-- Content inside bar -->
<text x="850" y="478" text-anchor="middle" font-size="28" font-weight="800" fill="#8A8AAA">GERING</text>
<text x="850" y="510" text-anchor="middle" font-size="12" fill="#8A8AAA">Kollektiv, diffus, geteilt</text>

<!-- Central annotation -->
<text x="600" y="320" text-anchor="middle" font-size="36" fill="#E0D9F5">→</text>
<rect x="530" y="370" width="140" height="44" fill="#590DA0" rx="6"/>
<text x="600" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Ergebnis:</text>
<text x="600" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Absicherung ist rational</text>

<!-- Legend row -->
<rect x="370" y="568" width="16" height="16" fill="#590DA0" rx="2"/>
<text x="392" y="581" font-size="12" fill="#4A4A6A">Schmerz bei Fehler (persönlich, sofort)</text>
<rect x="680" y="568" width="16" height="16" fill="#E0D9F5" rx="2" stroke="#C8B8E0" stroke-width="1"/>
<text x="702" y="581" font-size="12" fill="#4A4A6A">Gewinn beim Rechthaben (diffus, geteilt)</text>

<text x="600" y="614" text-anchor="middle" font-size="12" fill="#4A4A6A">Kein Memo nötig. Es reicht die Beobachtung, wie jemand anderes behandelt wird, wenn etwas schiefläuft.</text>
</svg>
