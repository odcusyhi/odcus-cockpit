<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="26" font-weight="700" fill="#1A1A2E">Die Reihenfolge entscheidet</text>

  <!-- Divider -->
  <line x1="600" y1="72" x2="600" y2="598" stroke="#E0D9F5" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- === LEFT: Tool-first === -->
  <rect x="72" y="74" width="456" height="44" rx="8" fill="#9A9AB0"/>
  <text x="300" y="101" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">Tool-first</text>

  <rect x="72" y="134" width="456" height="64" rx="8" fill="#EDEDF4" stroke="#9A9AB0" stroke-width="1.5"/>
  <text x="300" y="162" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#4A4A6A">1. Tool kaufen</text>
  <text x="300" y="184" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#6A6A8A">Lizenz anschaffen, weil es vielversprechend klingt</text>
  <line x1="300" y1="199" x2="300" y2="226" stroke="#9A9AB0" stroke-width="2"/>
  <polygon points="293,224 307,224 300,236" fill="#9A9AB0"/>

  <rect x="72" y="238" width="456" height="64" rx="8" fill="#EDEDF4" stroke="#9A9AB0" stroke-width="1.5"/>
  <text x="300" y="266" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#4A4A6A">2. Anwendung suchen</text>
  <text x="300" y="288" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#6A6A8A">„Was können wir damit machen?"</text>
  <line x1="300" y1="303" x2="300" y2="330" stroke="#9A9AB0" stroke-width="2"/>
  <polygon points="293,328 307,328 300,340" fill="#9A9AB0"/>

  <rect x="72" y="342" width="456" height="64" rx="8" fill="#EDEDF4" stroke="#9A9AB0" stroke-width="1.5"/>
  <text x="300" y="370" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#4A4A6A">3. Sporadische Nutzung</text>
  <text x="300" y="392" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#6A6A8A">Ein paar Enthusiasten nutzen es, die anderen nicht</text>
  <line x1="300" y1="407" x2="300" y2="434" stroke="#9A9AB0" stroke-width="2"/>
  <polygon points="293,432 307,432 300,444" fill="#9A9AB0"/>

  <rect x="72" y="446" width="456" height="60" rx="8" fill="#EDEDF4" stroke="#9A9AB0" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="300" y="473" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#7A7A96">Lizenzen laufen</text>
  <text x="300" y="493" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#9A9AB0">kein messbarer Mehrwert</text>

  <!-- === RIGHT: Problem-first === -->
  <rect x="672" y="74" width="456" height="44" rx="8" fill="#590DA0"/>
  <text x="900" y="101" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">Problem-first</text>

  <rect x="672" y="134" width="456" height="64" rx="8" fill="#E0F7F6" stroke="#61D2CE" stroke-width="1.5"/>
  <text x="900" y="162" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">1. Problem definieren</text>
  <text x="900" y="184" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#4A4A6A">„Was kostet uns täglich am meisten Zeit?"</text>
  <line x1="900" y1="199" x2="900" y2="226" stroke="#61D2CE" stroke-width="2"/>
  <polygon points="893,224 907,224 900,236" fill="#61D2CE"/>

  <rect x="672" y="238" width="456" height="64" rx="8" fill="#E0F7F6" stroke="#61D2CE" stroke-width="1.5"/>
  <text x="900" y="266" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">2. Passendes Tool wählen</text>
  <text x="900" y="288" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#4A4A6A">„Welches Tool löst genau das?"</text>
  <line x1="900" y1="303" x2="900" y2="330" stroke="#61D2CE" stroke-width="2"/>
  <polygon points="893,328 907,328 900,340" fill="#61D2CE"/>

  <rect x="672" y="342" width="456" height="64" rx="8" fill="#E0F7F6" stroke="#61D2CE" stroke-width="1.5"/>
  <text x="900" y="370" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">3. Piloten starten</text>
  <text x="900" y="392" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#4A4A6A">Klarer Auftrag, messbare Erfolgskriterien</text>
  <line x1="900" y1="407" x2="900" y2="434" stroke="#61D2CE" stroke-width="2"/>
  <polygon points="893,432 907,432 900,444" fill="#61D2CE"/>

  <rect x="672" y="446" width="456" height="60" rx="8" fill="#C8EFF0" stroke="#61D2CE" stroke-width="2"/>
  <text x="900" y="473" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Messbarer Mehrwert</text>
  <text x="900" y="493" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" fill="#4A4A6A">Zeitersparnis sichtbar, Team überzeugt</text>

  <!-- Footer note -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
