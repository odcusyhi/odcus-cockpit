<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter,Arial,Helvetica,sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8F7FF"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#1A1A2E">Der Unterschied: AI Literacy</text>

  <!-- VS divider -->
  <line x1="590" y1="70" x2="590" y2="580" stroke="#1A1A2E" stroke-width="2" stroke-dasharray="8,5" opacity="0.3"/>
  <rect x="558" y="315" width="64" height="38" rx="8" fill="#1A1A2E"/>
  <text x="590" y="340" text-anchor="middle" font-size="18" font-weight="700" fill="white">vs.</text>

  <!-- Left panel: KI ohne Training (gray) -->
  <rect x="60" y="80" width="500" height="480" rx="14" fill="#E8E8F0"/>
  <text x="310" y="125" text-anchor="middle" font-size="20" font-weight="700" fill="#666">KI ohne Training</text>

  <!-- Car outline (stylized) -->
  <rect x="110" y="155" width="400" height="130" rx="30" fill="#BBBBC8" opacity="0.7"/>
  <rect x="170" y="130" width="270" height="80" rx="20" fill="#BBBBC8" opacity="0.7"/>
  <circle cx="175" cy="295" r="30" fill="#888"/>
  <circle cx="175" cy="295" r="16" fill="#CCC"/>
  <circle cx="415" cy="295" r="30" fill="#888"/>
  <circle cx="415" cy="295" r="16" fill="#CCC"/>

  <!-- Confused figure beside car -->
  <circle cx="545" cy="215" r="24" fill="#888"/>
  <line x1="545" y1="239" x2="545" y2="295" stroke="#888" stroke-width="4"/>
  <line x1="545" y1="260" x2="520" y2="280" stroke="#888" stroke-width="4"/>
  <line x1="545" y1="260" x2="560" y2="285" stroke="#888" stroke-width="4"/>
  <line x1="545" y1="295" x2="525" y2="330" stroke="#888" stroke-width="4"/>
  <line x1="545" y1="295" x2="555" y2="332" stroke="#888" stroke-width="4"/>
  <!-- Question marks -->
  <text x="508" y="200" font-size="24" font-weight="700" fill="#888" opacity="0.7">?</text>
  <text x="558" y="195" font-size="20" font-weight="700" fill="#888" opacity="0.5">?</text>
  <text x="519" y="175" font-size="16" font-weight="700" fill="#888" opacity="0.4">?</text>

  <!-- Label below car -->
  <rect x="110" y="350" width="400" height="50" rx="8" fill="#888" opacity="0.2"/>
  <text x="310" y="382" text-anchor="middle" font-size="14" fill="#555" font-weight="600">Teures Tool, das niemand nutzen kann</text>

  <!-- Bullet points left -->
  <text x="130" y="440" font-size="14" fill="#666">✗  Blindes Vertrauen in KI-Output</text>
  <text x="130" y="470" font-size="14" fill="#666">✗  Datenschutzrisiken unbekannt</text>
  <text x="130" y="500" font-size="14" fill="#666">✗  Kein ROI messbar</text>

  <!-- Right panel: KI mit AI Literacy (purple/teal) -->
  <rect x="640" y="80" width="500" height="480" rx="14" fill="#F0E8FF"/>
  <text x="890" y="125" text-anchor="middle" font-size="20" font-weight="700" fill="#590DA0">KI mit AI Literacy</text>

  <!-- Car with driver (teal) -->
  <rect x="680" y="155" width="400" height="130" rx="30" fill="#61D2CE" opacity="0.75"/>
  <rect x="740" y="130" width="270" height="80" rx="20" fill="#61D2CE" opacity="0.75"/>
  <circle cx="745" cy="295" r="30" fill="#0A8A87"/>
  <circle cx="745" cy="295" r="16" fill="#61D2CE"/>
  <circle cx="985" cy="295" r="30" fill="#0A8A87"/>
  <circle cx="985" cy="295" r="16" fill="#61D2CE"/>

  <!-- Confident driver inside cockpit -->
  <circle cx="830" cy="185" r="20" fill="#590DA0"/>
  <line x1="830" y1="205" x2="830" y2="235" stroke="#590DA0" stroke-width="4"/>
  <line x1="830" y1="218" x2="810" y2="230" stroke="#590DA0" stroke-width="4"/>
  <line x1="830" y1="218" x2="850" y2="230" stroke="#590DA0" stroke-width="4"/>
  <!-- Steering wheel hint -->
  <circle cx="830" cy="230" r="14" fill="none" stroke="#8719E1" stroke-width="3"/>

  <!-- Label below car -->
  <rect x="680" y="350" width="400" height="50" rx="8" fill="#590DA0" opacity="0.15"/>
  <text x="880" y="382" text-anchor="middle" font-size="14" fill="#590DA0" font-weight="600">Voller ROI, gezielte Nutzung</text>

  <!-- Bullet points right -->
  <text x="700" y="440" font-size="14" fill="#590DA0">✓  Kritisches Denken bei KI-Output</text>
  <text x="700" y="470" font-size="14" fill="#590DA0">✓  Datenschutz bewusst einhalten</text>
  <text x="700" y="500" font-size="14" fill="#590DA0">✓  Messbarer Effizienzgewinn</text>
</svg>