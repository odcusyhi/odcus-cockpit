<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
  <text x="600" y="55" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="26" font-weight="700" fill="#1A1A2E">Die vier Muster der CYA-Kultur</text>

  <!-- Box 1: Die Warn-E-Mail (top-left) -->
  <rect x="60" y="80" width="525" height="240" rx="8" fill="#FFFFFF" stroke="#E0D9F5" stroke-width="1.5"/>
  <rect x="60" y="80" width="5" height="240" rx="3" fill="#590DA0"/>
  <text x="85" y="118" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#61D2CE" letter-spacing="1">01</text>
  <text x="85" y="143" font-family="Inter,Arial,Helvetica,sans-serif" font-size="19" font-weight="700" fill="#1A1A2E">Die Warn-E-Mail</text>
  <text x="85" y="175" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">Fünf Minuten vor der Entscheidung kommt</text>
  <text x="85" y="194" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">ein Absatz über Risiken. Nicht um zu helfen.</text>
  <text x="85" y="213" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">Sondern um es später zitieren zu können.</text>

  <!-- Box 2: Der Approval-Loop (top-right) -->
  <rect x="615" y="80" width="525" height="240" rx="8" fill="#FFFFFF" stroke="#E0D9F5" stroke-width="1.5"/>
  <rect x="615" y="80" width="5" height="240" rx="3" fill="#590DA0"/>
  <text x="640" y="118" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#61D2CE" letter-spacing="1">02</text>
  <text x="640" y="143" font-family="Inter,Arial,Helvetica,sans-serif" font-size="19" font-weight="700" fill="#1A1A2E">Der 15-Personen-Approval-Loop</text>
  <text x="640" y="175" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">Sieben Abteilungen stimmen ab, obwohl</text>
  <text x="640" y="194" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">nur eine betroffen ist. Accountability wird</text>
  <text x="640" y="213" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">geteilt bis sie bei niemandem mehr liegt.</text>

  <!-- Box 3: Der sichere Vendor (bottom-left) -->
  <rect x="60" y="345" width="525" height="240" rx="8" fill="#FFFFFF" stroke="#E0D9F5" stroke-width="1.5"/>
  <rect x="60" y="345" width="5" height="240" rx="3" fill="#8719E1"/>
  <text x="85" y="383" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#61D2CE" letter-spacing="1">03</text>
  <text x="85" y="408" font-family="Inter,Arial,Helvetica,sans-serif" font-size="19" font-weight="700" fill="#1A1A2E">Der sichere Vendor</text>
  <text x="85" y="440" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">Man nimmt den bekanntesten Anbieter,</text>
  <text x="85" y="459" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">nicht den besten. Hinterher lässt sich</text>
  <text x="85" y="478" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">sagen: "Das macht der Marktführer auch."</text>

  <!-- Box 4: Das Scope-Kabuki (bottom-right) -->
  <rect x="615" y="345" width="525" height="240" rx="8" fill="#FFFFFF" stroke="#E0D9F5" stroke-width="1.5"/>
  <rect x="615" y="345" width="5" height="240" rx="3" fill="#8719E1"/>
  <text x="640" y="383" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#61D2CE" letter-spacing="1">04</text>
  <text x="640" y="408" font-family="Inter,Arial,Helvetica,sans-serif" font-size="19" font-weight="700" fill="#1A1A2E">Das Scope-Kabuki</text>
  <text x="640" y="440" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">Projektziele bleiben bewusst vage. Erfolg</text>
  <text x="640" y="459" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">und Misserfolg lassen sich hinterher</text>
  <text x="640" y="478" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="#4A4A6A">unterschiedlich definieren.</text>
</svg>
