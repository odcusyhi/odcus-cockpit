<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"><defs><style>text { font-family: Inter,Arial,Helvetica,sans-serif; }</style></defs><rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
<text x="600" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A2E">IT Cost Management Maturity Model</text>
<text x="600" y="76" text-anchor="middle" font-size="13" fill="#4A4A6A">Die meisten Schweizer KMU starten auf Stufe 1 oder 2 — Stufe 3 ist das realistische Ziel</text>
<rect x="120" y="440" width="220" height="130" fill="#C8C8D8" rx="8"/>
<text x="230" y="476" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A2E">1 — Reaktiv</text>
<text x="230" y="498" text-anchor="middle" font-size="12" fill="#4A4A6A">Rechnungen werden bezahlt,</text>
<text x="230" y="516" text-anchor="middle" font-size="12" fill="#4A4A6A">kein Überblick vorhanden</text>
<rect x="350" y="340" width="220" height="230" fill="#F0E8FF" rx="8"/>
<text x="460" y="376" text-anchor="middle" font-size="15" font-weight="700" fill="#590DA0">2 — Transparent</text>
<text x="460" y="398" text-anchor="middle" font-size="12" fill="#4A4A6A">Kosten bekannt,</text>
<text x="460" y="416" text-anchor="middle" font-size="12" fill="#4A4A6A">nach Kategorien erfasst</text>
<rect x="580" y="230" width="220" height="340" fill="#590DA0" rx="8"/>
<text x="690" y="266" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">3 — Optimierend</text>
<text x="690" y="288" text-anchor="middle" font-size="12" fill="#F0E8FF">Aktive Reduktion,</text>
<text x="690" y="306" text-anchor="middle" font-size="12" fill="#F0E8FF">FinOps Prozesse etabliert</text>
<rect x="624" y="338" width="132" height="26" fill="#61D2CE" rx="13"/>
<text x="690" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">Ziel für die meisten KMU</text>
<rect x="810" y="110" width="220" height="460" fill="#8719E1" rx="8"/>
<text x="920" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">4 — Strategisch</text>
<text x="920" y="168" text-anchor="middle" font-size="12" fill="#E8D0FF">IT-Kosten als</text>
<text x="920" y="186" text-anchor="middle" font-size="12" fill="#E8D0FF">Steuerungsinstrument</text>
<text x="920" y="210" text-anchor="middle" font-size="12" fill="#E8D0FF">CFO + IT sprechen</text>
<text x="920" y="228" text-anchor="middle" font-size="12" fill="#E8D0FF">dieselbe Sprache</text>
<line x1="120" y1="570" x2="1030" y2="570" stroke="#E0D9F5" stroke-width="2"/>
<text x="230" y="590" text-anchor="middle" font-size="11" fill="#9B9BB4">Einstiegspunkt</text>
<text x="690" y="590" text-anchor="middle" font-size="11" fill="#590DA0">Realistisches Ziel</text>
<text x="920" y="590" text-anchor="middle" font-size="11" fill="#8719E1">Best-in-class</text>
</svg>