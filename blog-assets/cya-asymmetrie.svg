<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
  <text x="600" y="55" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="26" font-weight="700" fill="#1A1A2E">Das Asymmetrie-Problem</text>
  <text x="600" y="82" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="15" fill="#4A4A6A">Warum Absicherung zur rationalen Strategie wird</text>

  <!-- Left box: Pain of being blamed — large and dominant -->
  <rect x="60" y="110" width="590" height="420" rx="10" fill="#590DA0"/>
  <text x="355" y="185" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.7)">Schmerz bei Fehler</text>
  <text x="355" y="290" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="90" font-weight="800" fill="#FFFFFF">hoch</text>
  <text x="355" y="355" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Verantwortung, Sichtbarkeit,</text>
  <text x="355" y="374" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">Konsequenzen für die Karriere</text>
  <rect x="140" y="405" width="430" height="2" fill="rgba(255,255,255,0.2)"/>
  <text x="355" y="438" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Persönlich. Sofort. Sichtbar.</text>

  <!-- Right box: Gain from being right — smaller and muted -->
  <rect x="680" y="200" width="460" height="240" rx="10" fill="#E0D9F5" stroke="#E0D9F5" stroke-width="1"/>
  <text x="910" y="258" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="#4A4A6A">Gewinn wenn man recht hat</text>
  <text x="910" y="322" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="56" font-weight="800" fill="#8719E1">gering</text>
  <text x="910" y="370" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13" fill="#4A4A6A">Kollektiver Erfolg, diffuse</text>
  <text x="910" y="388" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13" fill="#4A4A6A">Anerkennung — wenn überhaupt.</text>

  <!-- Arrow and conclusion -->
  <text x="910" y="550" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#1A1A2E">Ergebnis: Absicherung ist rational.</text>
  <text x="910" y="572" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13" fill="#4A4A6A">Kein Memo nötig. Nur Beobachtung.</text>
</svg>
