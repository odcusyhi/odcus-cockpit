<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter,Arial,Helvetica,sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8F7FF"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#1A1A2E">Das Hybridmodell für 100–500 Mitarbeitende</text>

  <!-- Column 1: Interner IT-Lead (purple) -->
  <rect x="60" y="80" width="330" height="460" rx="14" fill="#590DA0"/>
  <text x="225" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="white">Interner IT-Lead</text>
  <line x1="100" y1="145" x2="350" y2="145" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="225" y="180" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Strategie</text>
  <text x="225" y="215" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Vendor Management</text>
  <text x="225" y="250" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Business Alignment</text>
  <text x="225" y="285" text-anchor="middle" font-size="14" fill="white" opacity="0.9">IT-Governance</text>
  <text x="225" y="320" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Interne Kommunikation</text>
  <line x1="100" y1="350" x2="350" y2="350" stroke="white" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="368" width="210" height="36" rx="8" fill="white" opacity="0.2"/>
  <text x="225" y="392" text-anchor="middle" font-size="15" fill="white" font-weight="700">1–3 Personen</text>

  <!-- Column 2: MSP (teal) -->
  <rect x="435" y="80" width="330" height="460" rx="14" fill="#61D2CE"/>
  <text x="600" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A2E">MSP</text>
  <line x1="475" y1="145" x2="725" y2="145" stroke="#1A1A2E" stroke-width="1" opacity="0.2"/>
  <text x="600" y="180" text-anchor="middle" font-size="14" fill="#1A1A2E" opacity="0.85">Helpdesk</text>
  <text x="600" y="215" text-anchor="middle" font-size="14" fill="#1A1A2E" opacity="0.85">Infrastruktur</text>
  <text x="600" y="250" text-anchor="middle" font-size="14" fill="#1A1A2E" opacity="0.85">Monitoring</text>
  <text x="600" y="285" text-anchor="middle" font-size="14" fill="#1A1A2E" opacity="0.85">M365-Administration</text>
  <text x="600" y="320" text-anchor="middle" font-size="14" fill="#1A1A2E" opacity="0.85">Backup &amp; Recovery</text>
  <line x1="475" y1="350" x2="725" y2="350" stroke="#1A1A2E" stroke-width="1" opacity="0.2"/>
  <rect x="495" y="368" width="210" height="36" rx="8" fill="#1A1A2E" opacity="0.12"/>
  <text x="600" y="392" text-anchor="middle" font-size="15" fill="#1A1A2E" font-weight="700">Operativer Betrieb</text>

  <!-- Column 3: Spezialisten (bright purple) -->
  <rect x="810" y="80" width="330" height="460" rx="14" fill="#8719E1"/>
  <text x="975" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="white">Spezialisten</text>
  <line x1="850" y1="145" x2="1100" y2="145" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="975" y="180" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Security Audit</text>
  <text x="975" y="215" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Cloud Migration</text>
  <text x="975" y="250" text-anchor="middle" font-size="14" fill="white" opacity="0.9">ERP-Einführung</text>
  <text x="975" y="285" text-anchor="middle" font-size="14" fill="white" opacity="0.9">Compliance-Beratung</text>
  <text x="975" y="320" text-anchor="middle" font-size="14" fill="white" opacity="0.9">NIS2 / DSGVO</text>
  <line x1="850" y1="350" x2="1100" y2="350" stroke="white" stroke-width="1" opacity="0.3"/>
  <rect x="870" y="368" width="210" height="36" rx="8" fill="white" opacity="0.2"/>
  <text x="975" y="392" text-anchor="middle" font-size="15" fill="white" font-weight="700">Ad hoc / Projekt</text>

  <!-- Bidirectional arrows between columns -->
  <!-- Arrow 1 between col1 and col2 -->
  <line x1="392" y1="310" x2="433" y2="310" stroke="#1A1A2E" stroke-width="2.5"/>
  <polygon points="429,304 441,310 429,316" fill="#1A1A2E"/>
  <polygon points="396,304 384,310 396,316" fill="#1A1A2E"/>

  <!-- Arrow 2 between col2 and col3 -->
  <line x1="767" y1="310" x2="808" y2="310" stroke="#1A1A2E" stroke-width="2.5"/>
  <polygon points="804,304 816,310 804,316" fill="#1A1A2E"/>
  <polygon points="771,304 759,310 771,316" fill="#1A1A2E"/>

  <!-- Footer note -->
  <text x="600" y="580" text-anchor="middle" font-size="14" fill="#590DA0" font-weight="600">Strategie bleibt intern. Betrieb geht raus. Projekte werden zugekauft.</text>
</svg>